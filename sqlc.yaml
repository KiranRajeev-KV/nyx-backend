version: "2"
sql:
  - name: "nyxdb"
    engine: "postgresql"
    schema:
      - "internal/db/migrations"
    queries:
      - "internal/db/queries"
    gen:
      go:
        out: "internal/db/gen"
        package: "db"
        sql_package: "pgx/v5"

        emit_methods_with_db_argument: true
        emit_json_tags: true

        overrides:
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"

          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

          - db_type: "boolean"
            go_type:
              type: "bool"

          - db_type: "text"
            go_type:
              type: "string"

          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"

          - db_type: "json"
            go_type: "encoding/json.RawMessage"

          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"

    database:
      uri: "postgresql://postgres:1234@localhost:5432/postgres"
