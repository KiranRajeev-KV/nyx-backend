version: "3"

tasks:
  default:
    desc: "Show available tasks"
    cmds:
      - task -l

  # ===== Setup =====
  setup:
    desc: "Setup project (install dependencies, create .env)"
    cmds:
      - task: deps
      - task: env
      - task: docker:up
    silent: false

  deps:
    desc: "Download and tidy Go dependencies"
    cmds:
      - go install github.com/air-verse/air@latest # Install Air
      - go install github.com/pressly/goose/v3/cmd/goose@latest # Install Goose
      - go install github.com/evilmartians/lefthook/v2@latest # Install Lefthook
      - go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest # Install sqlc
      - go mod download
      - go mod tidy

  env:
    desc: "Create .env file from .env.sample"
    cmds:
      - test -f .env || cp .env.sample .env
      - echo "[OK] .env file created/exists"

  # ===== Development =====
  dev:
    desc: "Start development server with hot reload (requires air)"
    cmds:
      - air
    interactive: true

  build:
    desc: "Build the project"
    cmds:
      - go build -o ./bin/nyx-backend main.go
      - 'echo "[OK] Built: ./bin/nyx-backend"'

  run:
    desc: "Build and run the project"
    cmds:
      - task: build
      - ./bin/nyx-backend

  # ===== Database =====
  start:
    desc: "Start docker containers (PostgreSQL and Drizzle Gateway)"
    cmds:
      - docker compose start
      - echo "[OK] DB & Drizzle Gateway started"

  stop:
    desc: "Stop docker containers (PostgreSQL and Drizzle Gateway)"
    cmds:
      - docker compose stop
      - echo "[OK] DB & Drizzle Gateway stopped"

  docker:up:
    desc: "Start PostgreSQL and Drizzle Gateway containers"
    cmds:
      - docker compose up -d
      - echo "[OK] Database services started"
      - sleep 3
      - 'echo "PostgreSQL: localhost:5432"'
      - 'echo "Drizzle Gateway: localhost:4983"'

  docker:down:
    desc: "Stop and remove all containers"
    cmds:
      - docker compose down
      - echo "[OK] Database services stopped"

  docker:logs:
    desc: "View database container logs"
    cmds:
      - docker compose logs -f postgres

  docker:reset:
    desc: "Stop, remove containers and volumes (WARNING: deletes data)"
    cmds:
      - docker compose down -v
      - echo "[OK] Database reset complete"

  db:seed:
    desc: "Seed the database with dummy data (DEV only)"
    cmds:
      - go run internal/seed/seed.go --seed

  db:truncate:
    desc: "Truncate all tables (DEV only)"
    cmds:
      - go run internal/seed/seed.go --truncate

  db:rebuild:
    desc: "Truncate and then seed the database (DEV only)"
    cmds:
      - go run internal/seed/seed.go --truncate --seed

  # ===== Migrations =====
  status:
    desc: "Show migration status"
    env:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "host=localhost user=postgres password=1234 dbname=postgres sslmode=disable"
      GOOSE_MIGRATION_DIR: internal/db/migrations
    cmds:
      - goose status

  up:
    desc: "Run all pending migrations"
    env:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "host=localhost user=postgres password=1234 dbname=postgres sslmode=disable"
      GOOSE_MIGRATION_DIR: internal/db/migrations
    cmds:
      - goose up

  down:
    desc: "Rollback last migration"
    env:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "host=localhost user=postgres password=1234 dbname=postgres sslmode=disable"
      GOOSE_MIGRATION_DIR: internal/db/migrations
    cmds:
      - goose down

  # ===== Code Generation =====
  gen:
    desc: "Generate code (sqlc)"
    cmds:
      - sqlc generate
      - echo "[OK] Code generation complete"

  gen:watch:
    desc: "Watch for changes and regenerate (requires watchexec)"
    cmds:
      - watchexec -e sql,yaml -- go-task gen

  # ===== Testing =====
  # test:
  #   desc: "Run all tests"
  #   cmds:
  #     - go test -v ./...

  # test:coverage:
  #   desc: "Run tests with coverage report"
  #   cmds:
  #     - go test -v -coverprofile=coverage.out ./...
  #     - go tool cover -html=coverage.out -o coverage.html
  #     - 'echo "[OK] Coverage report: coverage.html"'

  # test:unit:
  #   desc: "Run unit tests only"
  #   cmds:
  #     - go test -v -short ./...

  # ===== Linting & Formatting =====
  fmt:
    desc: "Format Go code"
    cmds:
      - go fmt ./...
      - echo "[OK] Code formatted"

  lint:
    desc: "Run linter (requires golangci-lint)"
    cmds:
      - golangci-lint run ./...

  vet:
    desc: "Run go vet"
    cmds:
      - go vet ./...
      - echo "[OK] No issues found"

