services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: nyx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    networks:
      - nyx-network
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # postgres-test:
  #   image: pgvector/pgvector:pg18
  #   container_name: nyx-postgres-test
  #   restart: "no"
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: "1234"
  #     POSTGRES_DB: postgres_test
  #   ports:
  #     - "5433:5432"
  #   networks:
  #     - nyx-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  drizzle-gate:
    image: ghcr.io/drizzle-team/gateway:latest
    container_name: nyx-drizzle-gateway
    environment:
      DATABASE_URL: postgresql://postgres:1234@postgres:5432/postgres
      STORE_PATH: /app
    restart: on-failure
    depends_on:
      - postgres
    ports:
      - "4983:4983"
    volumes:
      - drizzle_gateway_data:/app
    networks:
      - nyx-network

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: nyx-garage
    restart: unless-stopped
    command: ["/garage", "server"]
    ports:
      - "3900:3900" # S3 API
      - "3901:3901" # RPC / Gossip
      - "3902:3902" # Web API
      - "3903:3903" # Admin API
    volumes:
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta
      - ./garage.toml:/etc/garage.toml  # config file
    networks:
      - nyx-network

volumes:
  postgres_data:
  drizzle_gateway_data:
  garage_data:
  garage_meta:

networks:
  nyx-network:
    driver: bridge